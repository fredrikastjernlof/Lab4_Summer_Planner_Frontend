<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon_sun.png">
  <title>Home - Summer Planner</title>
</head>

<body>
  <header class="site-header">
    <h1>🌞 Summer Planner</h1>
    <p>Plan your sunny days, trips, todos and summer moments.</p>
  </header>

  <main>
    <section class="auth-section" aria-label="Account access">
      <article class="auth-card">
        <h2>Create account</h2>

        <p id="registerStatusMessage" class="status-message"></p>

        <form id="registerForm" novalidate>
          <label for="registerUsername">Username</label>
          <input type="text" id="registerUsername" required autocomplete="username">

          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" required autocomplete="new-password">

          <label for="registerPasswordConfirm">Repeat password</label>
          <input id="registerPasswordConfirm" type="password" required autocomplete="new-password" >

          <button type="submit">Register</button>
        </form>
      </article>

      <article class="auth-card">
        <h2>Log in</h2>

        <p id="loginStatusMessage" class="status-message"></p>

        <form id="loginForm" novalidate>
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" autocomplete="username" required>

          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required>

          <button type="submit">Log in</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Summer Planner by Fredrika Stjernlöf. All rights reserved.</p>
  </footer>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
        <p id="loadingMessage">Signing in...</p>

        <button id="cancelLoadingButton" type="button">
            Cancel
        </button>
    </div>
</div>

  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
